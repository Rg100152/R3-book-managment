<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3 Book - Book Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
        
        :root {
            --primary: #0F172A;
            --accent: #D97706;
        }
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .logo-font {
            font-family: 'Playfair Display', sans-serif;
        }

        .book-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .nav-link {
            transition: all 0.2s;
        }
        
        .nav-link.active {
            background-color: #1E2937;
            color: #FBBF24;
            border-left: 4px solid #D97706;
        }

        .modal {
            animation: modalPop 0.3s ease;
        }
        
        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .stats-card {
            background: linear-gradient(135deg, #0F172A, #1E2937);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div class="w-72 bg-slate-900 border-r border-slate-700 flex flex-col">
            <div class="p-6 border-b border-slate-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-amber-600 rounded-xl flex items-center justify-center text-white text-2xl font-bold logo-font">R3</div>
                    <div>
                        <span class="text-3xl font-bold logo-font tracking-tight">R3 Book</span>
                    </div>
                </div>
                <p class="text-slate-400 text-sm mt-1">Library Management</p>
            </div>
            
            <div class="flex-1 py-8 px-4 overflow-y-auto">
                <nav class="space-y-1">
                    <a href="#" onclick="navigateTo('dashboard')" class="nav-link active flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800" id="nav-dashboard">
                        <i class="fas fa-tachometer-alt w-5"></i>
                        <span class="font-medium">डैशबोर्ड</span>
                    </a>
                    <a href="#" onclick="navigateTo('books')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800" id="nav-books">
                        <i class="fas fa-book w-5"></i>
                        <span class="font-medium">सभी किताबें</span>
                    </a>
                    <a href="#" onclick="navigateTo('add')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800" id="nav-add">
                        <i class="fas fa-plus w-5"></i>
                        <span class="font-medium">नई किताब जोड़ें</span>
                    </a>
                    <a href="#" onclick="navigateTo('borrowed')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800" id="nav-borrowed">
                        <i class="fas fa-hand-holding w-5"></i>
                        <span class="font-medium">उधार ली गई</span>
                    </a>
                </nav>
                
                <div class="mt-12 px-4">
                    <div class="text-xs uppercase tracking-widest text-slate-500 mb-4">Quick Stats</div>
                    <div id="sidebar-stats" class="space-y-4">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
            
            <div class="p-4 border-t border-slate-700">
                <div class="flex items-center gap-3 bg-slate-800 rounded-2xl p-3">
                    <div class="w-9 h-9 bg-emerald-500 rounded-full flex items-center justify-center text-white font-medium">AD</div>
                    <div class="flex-1">
                        <div class="font-medium text-sm">Admin User</div>
                        <div class="text-emerald-400 text-xs">Online</div>
                    </div>
                    <button onclick="logout()" class="text-slate-400 hover:text-white">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Top Bar -->
            <div class="h-16 border-b border-slate-700 bg-slate-900 px-8 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden text-slate-400 hover:text-white">
                        <i class="fas fa-bars text-2xl"></i>
                    </button>
                    <div class="relative w-80">
                        <input id="global-search" 
                               onkeyup="if(event.key === 'Enter') searchBooks()"
                               type="text" 
                               placeholder="किताब या लेखक खोजें..." 
                               class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3 pl-12 pr-4 text-sm focus:outline-none focus:border-amber-500">
                        <i class="fas fa-search absolute left-5 top-3.5 text-slate-400"></i>
                    </div>
                </div>
                
                <div class="flex items-center gap-6">
                    <button onclick="showAddModal()" 
                            class="flex items-center gap-2 bg-amber-600 hover:bg-amber-500 transition-colors px-6 py-2.5 rounded-2xl font-medium">
                        <i class="fas fa-plus"></i>
                        <span>नई किताब</span>
                    </button>
                    
                    <div class="flex items-center gap-2 bg-slate-800 rounded-2xl px-4 py-2">
                        <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                        <span class="text-sm text-slate-400">Live</span>
                    </div>
                    
                    <div class="text-right">
                        <div class="text-sm font-medium">30 जून 2026</div>
                        <div class="text-xs text-slate-500">Tuesday</div>
                    </div>
                </div>
            </div>
            
            <!-- Content Area -->
            <div class="flex-1 overflow-auto p-8" id="main-content">
                <!-- Dashboard will load by default -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Book Modal -->
    <div id="book-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="modal bg-slate-900 w-full max-w-lg mx-4 rounded-3xl border border-slate-700 shadow-2xl">
            <div class="px-8 py-6 border-b border-slate-700 flex items-center justify-between">
                <h2 id="modal-title" class="text-2xl font-semibold">नई किताब जोड़ें</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-2xl">×</button>
            </div>
            
            <div class="p-8 space-y-6">
                <div>
                    <label class="block text-sm text-slate-400 mb-2">किताब का नाम</label>
                    <input id="book-title" type="text" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-500">
                </div>
                
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">लेखक</label>
                        <input id="book-author" type="text" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-500">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">ISBN</label>
                        <input id="book-isbn" type="text" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-500">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">श्रेणी</label>
                        <select id="book-genre" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-500">
                            <option value="Fiction">Fiction</option>
                            <option value="Non-Fiction">Non-Fiction</option>
                            <option value="Science">Science</option>
                            <option value="Technology">Technology</option>
                            <option value="Biography">Biography</option>
                            <option value="History">History</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">कुल प्रतियां</label>
                        <input id="book-quantity" type="number" value="1" min="1" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-500">
                    </div>
                </div>
            </div>
            
            <div class="p-8 border-t border-slate-700 flex gap-4">
                <button onclick="closeModal()" 
                        class="flex-1 py-4 text-slate-300 hover:bg-slate-800 rounded-2xl font-medium border border-slate-700">
                    रद्द करें
                </button>
                <button onclick="saveBook()" 
                        id="save-btn"
                        class="flex-1 py-4 bg-amber-600 hover:bg-amber-500 rounded-2xl font-medium transition-colors">
                    सहेजें
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 right-6 bg-emerald-600 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3">
        <i class="fas fa-check-circle"></i>
        <span id="toast-text" class="font-medium"></span>
    </div>

    <script>
        // Tailwind script already loaded via CDN
        
        let books = [];
        let currentEditId = null;
        
        // Load from localStorage
        function loadBooks() {
            const saved = localStorage.getItem('r3books');
            if (saved) {
                books = JSON.parse(saved);
            } else {
                // Sample data
                books = [
                    {
                        id: 1,
                        title: "Atomic Habits",
                        author: "James Clear",
                        isbn: "9780735211292",
                        genre: "Self-Help",
                        quantity: 12,
                        available: 8
                    },
                    {
                        id: 2,
                        title: "The Psychology of Money",
                        author: "Morgan Housel",
                        isbn: "9780857197689",
                        genre: "Finance",
                        quantity: 7,
                        available: 7
                    },
                    {
                        id: 3,
                        title: "Sapiens",
                        author: "Yuval Noah Harari",
                        isbn: "9780062316097",
                        genre: "History",
                        quantity: 5,
                        available: 2
                    }
                ];
                saveBooks();
            }
        }
        
        function saveBooks() {
            localStorage.setItem('r3books', JSON.stringify(books));
        }
        
        // Render functions
        function renderDashboard() {
            let html = `
                <div class="max-w-7xl mx-auto">
                    <div class="mb-10">
                        <h1 class="text-4xl font-semibold logo-font">Welcome back, Admin</h1>
                        <p class="text-slate-400 mt-2">Here's what's happening in your library today.</p>
                    </div>
                    
                    <!-- Stats -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                        <div class="stats-card rounded-3xl p-8 text-white">
                            <div class="flex justify-between">
                                <div>
                                    <p class="text-slate-400 text-sm">Total Books</p>
                                    <p class="text-5xl font-bold mt-3">${books.length}</p>
                                </div>
                                <i class="fas fa-book text-4xl opacity-40"></i>
                            </div>
                        </div>
                        
                        <div class="stats-card rounded-3xl p-8 text-white">
                            <div class="flex justify-between">
                                <div>
                                    <p class="text-slate-400 text-sm">Total Copies</p>
                                    <p class="text-5xl font-bold mt-3">${books.reduce((a, b) => a + b.quantity, 0)}</p>
                                </div>
                                <i class="fas fa-copy text-4xl opacity-40"></i>
                            </div>
                        </div>
                        
                        <div class="stats-card rounded-3xl p-8 text-white">
                            <div class="flex justify-between">
                                <div>
                                    <p class="text-slate-400 text-sm">Available</p>
                                    <p class="text-5xl font-bold mt-3 text-emerald-400">${books.reduce((a, b) => a + b.available, 0)}</p>
                                </div>
                                <i class="fas fa-check-circle text-4xl opacity-40"></i>
                            </div>
                        </div>
                        
                        <div class="stats-card rounded-3xl p-8 text-white">
                            <div class="flex justify-between">
                                <div>
                                    <p class="text-slate-400 text-sm">Borrowed</p>
                                    <p class="text-5xl font-bold mt-3 text-amber-400">${books.reduce((a, b) => a + (b.quantity - b.available), 0)}</p>
                                </div>
                                <i class="fas fa-hand-holding text-4xl opacity-40"></i>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Recent Books -->
                    <div>
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-semibold">Recent Books</h2>
                            <button onclick="navigateTo('books')" class="text-amber-500 hover:text-amber-400 text-sm font-medium flex items-center gap-2">
                                View All <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="recent-books">
                            <!-- JS populated -->
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('main-content').innerHTML = html;
            renderRecentBooks();
            updateSidebarStats();
        }
        
        function renderRecentBooks() {
            const container = document.getElementById('recent-books');
            if (!container) return;
            
            const recent = [...books].slice(0, 3);
            
            let html = '';
            recent.forEach(book => {
                const borrowed = book.quantity - book.available;
                html += `
                    <div class="book-card bg-slate-900 border border-slate-700 rounded-3xl p-6">
                        <div class="flex justify-between">
                            <div class="text-emerald-400 text-sm font-medium">${book.genre}</div>
                            <div class="text-xs bg-slate-800 px-3 py-1 rounded-full">${book.isbn}</div>
                        </div>
                        <h3 class="font-semibold text-xl mt-4 leading-tight line-clamp-2">${book.title}</h3>
                        <p class="text-slate-400 mt-1">${book.author}</p>
                        
                        <div class="mt-8 flex justify-between items-end">
                            <div>
                                <div class="text-3xl font-bold">\( {book.available}<span class="text-base font-normal text-slate-400">/ \){book.quantity}</span></div>
                                <div class="text-xs text-slate-500">Available</div>
                            </div>
                            <button onclick="editBook(${book.id}); event.stopImmediatePropagation();" 
                                    class="bg-slate-800 hover:bg-slate-700 text-xs px-5 py-2 rounded-2xl">
                                Edit
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function renderAllBooks(filteredBooks = null) {
            const toRender = filteredBooks || books;
            
            let html = `
                <div class="max-w-7xl mx-auto">
                    <div class="flex justify-between items-end mb-8">
                        <div>
                            <h1 class="text-4xl font-semibold">Library Collection</h1>
                            <p class="text-slate-400">${toRender.length} books found</p>
                        </div>
                        <button onclick="showAddModal()" class="flex items-center gap-2 bg-amber-600 hover:bg-amber-500 px-6 py-3 rounded-2xl">
                            <i class="fas fa-plus"></i>
                            <span>Add New</span>
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="books-grid">
                        <!-- Populated by JS -->
                    </div>
                </div>
            `;
            
            document.getElementById('main-content').innerHTML = html;
            renderBooksGrid(toRender);
        }
        
        function renderBooksGrid(booksToShow) {
            const container = document.getElementById('books-grid');
            if (!container) return;
            
            let html = '';
            
            booksToShow.forEach(book => {
                const availabilityColor = book.available > 0 ? 'text-emerald-400' : 'text-red-400';
                const availabilityText = book.available > 0 ? 'Available' : 'Out of Stock';
                
                html += `
                    <div class="book-card bg-slate-900 border border-slate-700 rounded-3xl overflow-hidden group">
                        <div class="h-2 bg-gradient-to-r from-amber-500 to-yellow-500"></div>
                        <div class="p-8">
                            <div class="flex justify-between mb-6">
                                <span class="px-4 py-1 bg-slate-800 text-xs rounded-full">${book.genre}</span>
                                <span class="text-xs text-slate-500">${book.isbn}</span>
                            </div>
                            
                            <h3 class="text-2xl font-semibold leading-tight mb-2 line-clamp-2">${book.title}</h3>
                            <p class="text-slate-400">${book.author}</p>
                            
                            <div class="mt-10 flex items-center justify-between">
                                <div class="${availabilityColor} flex items-center gap-2">
                                    <i class="fas fa-circle text-xs"></i>
                                    <span class="font-medium">\( {book.available}/ \){book.quantity} ${availabilityText}</span>
                                </div>
                                
                                <div class="flex gap-2">
                                    <button onclick="editBook(${book.id}); event.stopImmediatePropagation();" 
                                            class="w-9 h-9 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded-2xl">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="deleteBook(${book.id}); event.stopImmediatePropagation();" 
                                            class="w-9 h-9 flex items-center justify-center bg-slate-800 hover:bg-red-900/30 text-red-400 rounded-2xl">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html || `<div class="col-span-full text-center py-20 text-slate-400">No books found</div>`;
        }
        
        function renderBorrowed() {
            const borrowedBooks = books.filter(b => (b.quantity - b.available) > 0);
            
            let html = `
                <div class="max-w-7xl mx-auto">
                    <h1 class="text-4xl font-semibold mb-8">Currently Borrowed Books</h1>
                    <div class="bg-slate-900 rounded-3xl p-8">
                        <table class="w-full">
                            <thead>
                                <tr class="border-b border-slate-700">
                                    <th class="text-left py-4 font-medium text-slate-400">Book</th>
                                    <th class="text-left py-4 font-medium text-slate-400">Author</th>
                                    <th class="text-center py-4 font-medium text-slate-400">Borrowed</th>
                                    <th class="text-center py-4 font-medium text-slate-400">Available</th>
                                </tr>
                            </thead>
                            <tbody id="borrowed-table">
                                <!-- JS populated -->
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            document.getElementById('main-content').innerHTML = html;
            renderBorrowedTable(borrowedBooks);
        }
        
        function renderBorrowedTable(borrowedBooks) {
            const tbody = document.getElementById('borrowed-table');
            if (!tbody) return;
            
            let html = '';
            borrowedBooks.forEach(book => {
                const borrowedCount = book.quantity - book.available;
                html += `
                    <tr class="border-b border-slate-800 hover:bg-slate-800/70">
                        <td class="py-6">
                            <div class="font-medium">${book.title}</div>
                        </td>
                        <td class="py-6 text-slate-400">${book.author}</td>
                        <td class="py-6 text-center font-semibold text-amber-400">${borrowedCount}</td>
                        <td class="py-6 text-center">${book.available}</td>
                    </tr>
                `;
            });
            
            if (borrowedBooks.length === 0) {
                html = `<tr><td colspan="4" class="text-center py-12 text-slate-400">No books currently borrowed.</td></tr>`;
            }
            
            tbody.innerHTML = html;
        }
        
        function updateSidebarStats() {
            const total = books.length;
            const totalCopies = books.reduce((sum, b) => sum + b.quantity, 0);
            const available = books.reduce((sum, b) => sum + b.available, 0);
            
            const html = `
                <div class="bg-slate-800/50 rounded-2xl p-5 text-sm">
                    <div class="flex justify-between">
                        <span class="text-slate-400">Total Books</span>
                        <span class="font-semibold">${total}</span>
                    </div>
                </div>
                <div class="bg-slate-800/50 rounded-2xl p-5 text-sm">
                    <div class="flex justify-between">
                        <span class="text-slate-400">Total Copies</span>
                        <span class="font-semibold">${totalCopies}</span>
                    </div>
                </div>
                <div class="bg-emerald-900/30 rounded-2xl p-5 text-sm">
                    <div class="flex justify-between text-emerald-400">
                        <span>Available Now</span>
                        <span class="font-semibold">${available}</span>
                    </div>
                </div>
            `;
            document.getElementById('sidebar-stats').innerHTML = html;
        }
        
        // Navigation
        function navigateTo(page) {
            // Remove active class from all
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            
            if (page === 'dashboard') {
                document.getElementById('nav-dashboard').classList.add('active');
                renderDashboard();
            } else if (page === 'books') {
                document.getElementById('nav-books').classList.add('active');
                renderAllBooks();
            } else if (page === 'add') {
                document.getElementById('nav-add').classList.add('active');
                showAddModal();
            } else if (page === 'borrowed') {
                document.getElementById('nav-borrowed').classList.add('active');
                renderBorrowed();
            }
        }
        
        // Modal
        function showAddModal() {
            currentEditId = null;
            document.getElementById('modal-title').textContent = 'नई किताब जोड़ें';
            document.getElementById('save-btn').textContent = 'जोड़ें';
            
            // Clear fields
            document.getElementById('book-title').value = '';
            document.getElementById('book-author').value = '';
            document.getElementById('book-isbn').value = '';
            document.getElementById('book-genre').value = 'Fiction';
            document.getElementById('book-quantity').value = '1';
            
            document.getElementById('book-modal').classList.remove('hidden');
            document.getElementById('book-title').focus();
        }
        
        function closeModal() {
            document.getElementById('book-modal').classList.add('hidden');
        }
        
        function saveBook() {
            const title = document.getElementById('book-title').value.trim();
            const author = document.getElementById('book-author').value.trim();
            const isbn = document.getElementById('book-isbn').value.trim();
            const genre = document.getElementById('book-genre').value;
            const quantity = parseInt(document.getElementById('book-quantity').value) || 1;
            
            if (!title || !author) {
                showToast("Title and Author are required", true);
                return;
            }
            
            if (currentEditId !== null) {
                // Edit existing
                const book = books.find(b => b.id === currentEditId);
                if (book) {
                    book.title = title;
                    book.author = author;
                    book.isbn = isbn;
                    book.genre = genre;
                    book.quantity = quantity;
                    // available stays the same
                }
                showToast("Book updated successfully!");
            } else {
                // Add new
                const newBook = {
                    id: Date.now(),
                    title,
                    author,
                    isbn: isbn || "ISBN-" + Math.floor(100000 + Math.random() * 900000),
                    genre,
                    quantity: quantity,
                    available: quantity
                };
                books.push(newBook);
                showToast("New book added successfully!");
            }
            
            saveBooks();
            closeModal();
            
            // Refresh current view
            if (document.getElementById('nav-books').classList.contains('active')) {
                renderAllBooks();
            } else if (document.getElementById('nav-dashboard').classList.contains('active')) {
                renderDashboard();
            } else {
                renderDashboard();
            }
        }
        
        function editBook(id) {
            const book = books.find(b => b.id === id);
            if (!book) return;
            
            currentEditId = id;
            
            document.getElementById('modal-title').textContent = 'Edit Book';
            document.getElementById('save-btn').textContent = 'Update';
            
            document.getElementById('book-title').value = book.title;
            document.getElementById('book-author').value = book.author;
            document.getElementById('book-isbn').value = book.isbn;
            document.getElementById('book-genre').value = book.genre;
            document.getElementById('book-quantity').value = book.quantity;
            
            document.getElementById('book-modal').classList.remove('hidden');
        }
        
        function deleteBook(id) {
            if (!confirm("Are you sure you want to delete this book?")) return;
            
            books = books.filter(b => b.id !== id);
            saveBooks();
            showToast("Book deleted");
            
            if (document.getElementById('nav-books').classList.contains('active')) {
                renderAllBooks();
            } else {
                renderDashboard();
            }
        }
        
        function searchBooks() {
            const query = document.getElementById('global-search').value.toLowerCase().trim();
            
            if (!query) {
                if (document.getElementById('nav-books').classList.contains('active')) {
                    renderAllBooks();
                }
                return;
            }
            
            const filtered = books.filter(book => 
                book.title.toLowerCase().includes(query) ||
                book.author.toLowerCase().includes(query) ||
                book.genre.toLowerCase().includes(query)
            );
            
            if (document.getElementById('nav-books').classList.contains('active')) {
                renderAllBooks(filtered);
            } else {
                navigateTo('books');
                setTimeout(() => {
                    renderAllBooks(filtered);
                }, 50);
            }
        }
        
        function showToast(message, error = false) {
            const toast = document.getElementById('toast');
            const text = document.getElementById('toast-text');
            
            text.textContent = message;
            toast.style.backgroundColor = error ? '#DC2626' : '#10B981';
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }
        
        function logout() {
            if (confirm("Logout from R3 Book?")) {
                showToast("Logged out successfully");
                setTimeout(() => {
                    window.location.reload();
                }, 1200);
            }
        }
        
        function toggleSidebar() {
            // For mobile responsiveness (simple alert for demo)
            showToast("Sidebar toggle is active in full version");
        }
        
        // Initialize
        function initializeApp() {
            loadBooks();
            renderDashboard();
            
            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.key === "/" && document.getElementById('global-search') !== document.activeElement) {
                    e.preventDefault();
                    document.getElementById('global-search').focus();
                }
            });
            
            // Close modal on escape
            document.addEventListener('keydown', (e) => {
                if (e.key === "Escape") {
                    const modal = document.getElementById('book-modal');
                    if (!modal.classList.contains('hidden')) closeModal();
                }
            });
            
            console.log('%cR3 Book Management System v2.0 initialized successfully ✅', 'color:#F59E0B; font-family:monospace; font-size:13px');
        }
        
        // Start the application
        window.onload = initializeApp;
    </script>
</body>
</html>
